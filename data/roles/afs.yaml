  application stacks, SSIS/SSRS/SSAS, and multi-terabyte databases. Owned platform
  reliability, performance tuning, security, release processes, and ETL modernization.

themes:
  - sql server administration
  - high availability & disaster recovery
  - performance tuning & troubleshooting
  - security & identity (ad/kerberos/spn)
  - etl modernization (ssis)
  - change management & release engineering

